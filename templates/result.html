<!DOCTYPE html>
<html lang="en">
<head>
    <title>Analysis Result</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>Resume Analysis Report</h1>

    <h2>ATS Score</h2>
    <p>{{ ats_score }}%</p>

    <h2>Job Match Percentage</h2>
    <p>{{ match_percentage }}%</p>

    <h2>Detected Skills</h2>

    <ul>
        {% for skill in skills %}
            <li>{{ skill }}</li>
        {% endfor %}
    </ul>

    <a href="/">Analyze Another Resume</a>

</div>

</body>
</html>
